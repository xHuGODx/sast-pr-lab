name: SAST Pipeline (Semgrep)
# This tells GitHub to run the scanner whenever a Pull Request is opened or updated
on:
  pull_request:
    branches: [ "main" ]
jobs:
  security-scan:
    name: Semgrep Analysis
    runs-on: ubuntu-latest
    steps:
# 1. Download the code from the repository
      - name: Checkout Code
      uses: actions/checkout@v3
# 2. Run the Semgrep SAST scanner
      - name: Run Semgrep
      uses: returntocorp/semgrep-action@v1
      with:
        config: "p/default"
        generateSarif: "1" # Generates a standard security report format
