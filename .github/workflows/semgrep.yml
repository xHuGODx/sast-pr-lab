name: SAST Pipeline (Semgrep)

# This tells GitHub to run the scanner whenever a Pull Request is opened or updated
on:
  pull_request:
    branches: [ "main" ]
    
jobs:
  security-scan:
    name: Semgrep Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"
          generateSarif: "1"
